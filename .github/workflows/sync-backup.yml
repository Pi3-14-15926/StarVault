name: Sync & Backup

on:
  schedule:
    # 每 6 小时运行一次
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  sync-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          rclone version

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub releases & backup via rclone
        run: node scripts/sync-backup.mjs
        env:
          # 默认备份渠道: webdav / onedrive / gdrive
          BACKUP_CHANNEL: ${{ secrets.BACKUP_CHANNEL || 'webdav' }}
          # GitHub
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_PROXY: ${{ secrets.GH_PROXY }}
          KEEP_VERSIONS: ${{ vars.KEEP_VERSIONS || '2' }}
          MAX_FILE_SIZE_MB: ${{ vars.MAX_FILE_SIZE_MB || '500' }}
          UPLOAD_TIMEOUT: ${{ vars.UPLOAD_TIMEOUT || '600' }}
          # WebDAV 渠道
          WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
          WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
          WEBDAV_BASE_DIR: ${{ secrets.WEBDAV_BASE_DIR || '/SoftwareHub' }}
          # OneDrive 渠道（token JSON）
          ONEDRIVE_TOKEN: ${{ secrets.ONEDRIVE_TOKEN }}
          # Google Drive 渠道（token JSON）
          GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
          # 上传代理（可选，用于国内 WebDAV 如 123 云盘）
          UPLOAD_PROXY: ${{ secrets.UPLOAD_PROXY }}
