name: 同步 GitHub Release

on:
  schedule:
    # 每 6 小时执行一次
    - cron: '0 */6 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 执行同步脚本
        run: npx tsx scripts/syncReleases.ts
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 提交变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects.json
          git diff --staged --quiet || git commit -m "chore: 自动同步 GitHub Release [skip ci]"
          git push
